<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>déjà wear</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>déjà wear</h1>
    <p class="tagline">see it on you before you buy it</p>
    <div id="counter" class="counter">
      <span><strong id="itemsSkipped">0</strong> skipped</span>
      <span><strong id="moneySaved">$0</strong> saved</span>
      <span><strong id="co2Saved">0</strong> kg CO2 saved</span>
      <span><strong id="waterSaved">0</strong> L water saved</span>
    </div>
  </header>

  <main>
    <p id="sourceBanner" class="source-banner" hidden></p>
    <p id="similarAlert" class="similar-alert" hidden></p>

    <section class="uploads">
      <div class="upload-box">
        <label for="personInput">Photo of you</label>
        <input type="file" id="personInput" accept="image/*" />
        <img id="personPreview" class="preview" hidden />
      </div>

      <div class="upload-box">
        <label for="garmentInput">Photo of the item</label>
        <input type="file" id="garmentInput" accept="image/*" />
        <img id="garmentPreview" class="preview" hidden />
      </div>
    </section>

    <section class="controls">
      <label for="itemName">Item name</label>
      <input type="text" id="itemName" placeholder="Blue hoodie" />
      <label for="category">Category</label>
      <select id="category">
        <option value="top">Top</option>
        <option value="bottom">Bottom</option>
        <option value="dress">Dress</option>
        <option value="shoes">Shoes</option>
        <option value="other">Other</option>
      </select>
      <label for="price">Price ($)</label>
      <input type="number" id="price" min="0" step="0.01" placeholder="49.99" />
      <button id="tryOnBtn">Try it on</button>
    </section>

    <p id="status" class="status" hidden></p>

    <section id="tryOnPreview" class="result" hidden>
      <img id="resultImage" alt="Try-on result" />
    </section>

    <section id="decision" class="decision">
      <div id="impactBadge" class="impact-badge"></div>
      <p>Already own something like this?</p>
      <button id="skipBtn" class="skip">I'll skip it (save $<span id="skipPrice">0</span>)</button>

      <div class="buy-flow">
        <select id="buyReason">
          <option value="" disabled selected>Still buying it — why?</option>
          <option value="worn_out">Mine's worn out / doesn't fit anymore</option>
          <option value="gift">It's a gift for someone else</option>
          <option value="backup">Want a backup / extra</option>
          <option value="no_similar">I don't actually own anything similar</option>
          <option value="other">Other</option>
        </select>
        <button id="buyBtn" class="buy">Confirm purchase</button>
      </div>
    </section>

    <section class="wardrobe-section">
      <h2>Your wardrobe</h2>
      <p id="wardrobeEmpty" class="wardrobe-empty" hidden>No try-ons yet — add a photo above to get started.</p>
      <div id="wardrobeGallery" class="wardrobe-gallery"></div>
    </section>
  </main>

  <script src="app.js"></script>
  <script src="wardrobe.js"></script>
</body>
</html>
