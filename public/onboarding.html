<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>déjà wear — your colors</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;0,700;1,500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <nav class="nav">
    <a class="nav-logo" href="/">déjà wear</a>
    <div class="nav-links">
      <a href="/onboarding.html">Find your colors</a>
    </div>
  </nav>

  <main class="app onboarding">
    <header class="hero">
      <p class="eyebrow">Find your colors, once</p>
      <h1 class="hero-title">Your seasonal palette.</h1>
      <p class="hero-sub">Upload one full-body photo in good light. We analyze your undertone
        and coloring a single time, then reuse it to score every item you try on.</p>
    </header>

    <section class="panel upload-panel">
      <div class="upload-box">
        <label for="personPhoto">Full-body photo of you (good lighting, no filters)</label>
        <input type="file" id="personPhoto" accept="image/*" />
        <img id="personPreview" class="preview" hidden />
      </div>
      <button id="analyzeBtn" class="btn-primary" style="width:100%; margin-top:16px;">Analyze my colors</button>
      <p id="status" class="status" hidden></p>
    </section>

    <section id="paletteCard" class="panel palette-card" hidden>
      <h2 id="paletteSeason"></h2>
      <p class="palette-meta" id="paletteUndertone"></p>

      <strong class="palette-label">Best colors</strong>
      <div class="swatch-row" id="bestColors"></div>

      <strong class="palette-label">Colors to avoid</strong>
      <div class="swatch-row" id="avoidColors"></div>

      <p class="palette-meta" id="analyzedAt"></p>
      <a id="continueLink" class="btn-primary continue-link" href="/" hidden>Continue →</a>
    </section>

    <a class="back-link" href="/">← Back to déjà wear</a>
  </main>

  <script src="onboarding.js"></script>
</body>
</html>
